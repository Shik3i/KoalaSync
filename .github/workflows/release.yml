name: Release KoalaSync

on:
  push:
    tags:
      - 'v*'

jobs:
  release-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/koala-sync-server:latest
            ghcr.io/${{ github.repository_owner }}/koala-sync-server:${{ github.ref_name }}

  release-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Extension Zip
        run: |
          zip -r koala-sync-extension.zip extension/ -x "*.DS_Store*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: koala-sync-extension.zip
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
